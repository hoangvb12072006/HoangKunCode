<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Việt Hoàng | Profile</title>
    <style>
        :root {
            --neon-color: #00ffff; /* Màu xanh ngọc chuẩn Cyberpunk */
            --bg-color: #0d0d0d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        .profile-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid var(--neon-color);
            border-radius: 15px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2), inset 0 0 10px rgba(0, 255, 255, 0.1);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid var(--neon-color);
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 15px var(--neon-color);
        }

        .name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--neon-color);
        }

        .bio {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: block;
            text-decoration: none;
            color: var(--neon-color);
            border: 1px solid var(--neon-color);
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background: transparent;
        }

        .link-btn:hover {
            background-color: var(--neon-color);
            color: #000;
            box-shadow: 0 0 20px var(--neon-color);
            transform: translateY(-2px);
        }

        /* Hiệu ứng nhấp nháy chữ (Glitch) nhẹ */
        .glitch-hover:hover {
            animation: glitch 0.2s linear infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- Thay link ảnh của bạn vào thuộc tính src dưới đây -->
        <img src="https://via.placeholder.com/120/00ffff/000000?text=HOANGKUN" alt="Avatar" class="avatar">
        
        <h1 class="name glitch-hover">Nguyễn Việt Hoàng</h1>
        <p class="bio">Developer & Administrator | HOANGKUN STORE</p>

        <div class="social-links">
            <!-- Thay dấu # bằng link thực tế của bạn -->
            <a href="#" class="link-btn" target="_blank">TikTok</a>
            <a href="#" class="link-btn" target="_blank">YouTube</a>
            <a href="#" class="link-btn" target="_blank">Facebook</a>
            <a href="#" class="link-btn" target="_blank">Cửa Hàng (Store)</a>
        </div>
    </div>

</body>
</html>
