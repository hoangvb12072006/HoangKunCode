<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hộp Thư Giao Lưu | Nguyễn Việt Hoàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- ĐỒNG BỘ THEME NEON CYBERPUNK TRANG CHỦ --- */
        :root {
            --bg-gradient: radial-gradient(circle at center, #14141a 0%, #08080a 100%);
            --card-bg: rgba(20, 20, 27, 0.85);
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --neon-primary: #8b5cf6;
            --neon-secondary: #06b6d4;
            --btn-gradient: linear-gradient(90deg, #8b5cf6, #06b6d4);
            --border-color: rgba(139, 92, 246, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        /* --- KHUNG CHAT TOÀN MÀN HÌNH --- */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 0 35px rgba(139, 92, 246, 0.25);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(12px);
        }

        /* --- THANH HEADER CHAT --- */
        .chat-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px 24px 0 0;
        }
        .header-info { display: flex; align-items: center; gap: 15px; }
        .header-avatar {
            width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid var(--neon-secondary); object-fit: cover;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }
        .header-name { font-weight: 700; font-size: 1.2rem; letter-spacing: -0.5px; }
        .header-status { font-size: 0.8rem; color: #10b981; display: flex; align-items: center; gap: 6px; font-weight: 600; margin-top: 2px; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        
        .back-btn { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.9rem; 
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .back-btn:hover { background: var(--btn-gradient); box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }

        /* --- VÙNG HIỂN THỊ TIN NHẮN --- */
        .chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message { max-width: 75%; padding: 12px 18px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; }
        
        .msg-received {
            background: rgba(255, 255, 255, 0.03);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .msg-sent {
            background: var(--btn-gradient);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #fff;
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
        }

        /* --- VÙNG NHẬP TIN NHẮN --- */
        .chat-input-area {
            padding: 20px 25px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 0 0 24px 24px;
        }
        
        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 0 25px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }
        .chat-input:focus { border-color: var(--neon-secondary); box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }
        
        .send-btn {
            background: var(--btn-gradient);
            border: none;
            width: 50px; height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
            transition: transform 0.2s;
        }
        .send-btn:hover { transform: scale(1.08); }
        .send-btn svg { width: 22px; height: 22px; fill: #fff; transform: translateX(2px); }

        @media (max-width: 600px) {
            body { padding: 0; }
            .chat-container { height: 100vh; border-radius: 0; border: none; }
            .chat-header { border-radius: 0; }
            .chat-input-area { border-radius: 0; padding: 15px; }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-info">
                <img src="https://sf-static.upanhlaylink.com/img/image_20260602fefd438b294ab40ad608577dd78dbf6f.jpg" alt="Avatar" class="header-avatar">
                <div>
                    <div class="header-name">Nguyễn Việt Hoàng</div>
                    <div class="header-status"><span class="status-dot"></span> Đang trực tuyến</div>
                </div>
            </div>
            <a href="index.html" class="back-btn">← Trang chủ</a>
        </div>

        <div class="chat-messages" id="chat-box">
            </div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="msg-input" placeholder="Nhập tin nhắn của bạn..." autocomplete="off">
            <button class="send-btn" onclick="if(typeof sendMessage === 'function') sendMessage();">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // Kích hoạt nhấn phím Enter để gửi nhanh
        document.getElementById('msg-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if(typeof sendMessage === 'function') sendMessage();
            }
        });
    </script>
    
    <script src="main.js"></script>
</body>
</html>
